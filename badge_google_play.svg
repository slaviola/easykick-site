<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 59" width="200" height="59">
  <rect width="200" height="59" rx="8" fill="#000"/>
  <rect x=".75" y=".75" width="198.5" height="57.5" rx="7.5" fill="none" stroke="#a6a6a6" stroke-width=".5"/>

  <!-- Google Play colorful triangle logo -->
  <defs>
    <linearGradient id="gp_green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#02d971"/>
      <stop offset="1" stop-color="#00921d"/>
    </linearGradient>
    <linearGradient id="gp_yellow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffe840"/>
      <stop offset="1" stop-color="#f9a800"/>
    </linearGradient>
    <linearGradient id="gp_red" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5252"/>
      <stop offset="1" stop-color="#d4006a"/>
    </linearGradient>
    <linearGradient id="gp_blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5cb8ff"/>
      <stop offset="1" stop-color="#006aff"/>
    </linearGradient>
  </defs>
  <g transform="translate(15,10)">
    <!-- Left green part (body of triangle) -->
    <path d="M1.5 1.2 L1.5 37.8 L20.5 19.5 Z" fill="url(#gp_green)"/>
    <!-- Top-right yellow part -->
    <path d="M1.5 1.2 L20.5 19.5 L29.5 14.5 L6.5 0 Z" fill="url(#gp_yellow)"/>
    <!-- Bottom-right red part -->
    <path d="M1.5 37.8 L20.5 19.5 L29.5 24.5 L6.5 39 Z" fill="url(#gp_red)"/>
    <!-- Right blue part -->
    <path d="M29.5 14.5 L20.5 19.5 L29.5 24.5 L35.5 19.5 Z" fill="url(#gp_blue)"/>
  </g>

  <text x="60" y="22" font-family="Arial, Helvetica, sans-serif" font-size="9.5" fill="#aaa" letter-spacing=".6">Disponibile su</text>
  <text x="59" y="46" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="500" fill="#fff" letter-spacing="-.3">Google Play</text>
</svg>
